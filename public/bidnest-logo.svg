<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" role="img" aria-labelledby="title desc">
  <title id="title">BidNest logo</title>
  <desc id="desc">A stylized B rising from layered nest shapes, topped by a digital cube and pixels, with the BidNest wordmark.</desc>

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3356F0"/>
      <stop offset="100%" stop-color="#149BFF"/>
    </linearGradient>

    <linearGradient id="nestGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#010F28"/>
      <stop offset="100%" stop-color="#3356F0"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(10,8)">
    <!-- Layered nest -->
    <path d="M38 128c20 30 70 48 123 48 47 0 93-14 121-40-10 36-58 61-121 61-62 0-109-23-123-69z"
          fill="#010F28"/>
    <path d="M24 110c17 34 73 57 136 57 62 0 115-20 139-51-8 35-64 65-139 65-73 0-128-28-136-71z"
          fill="url(#nestGrad)"/>
    <path d="M15 91c15 35 73 59 145 59 71 0 127-22 146-57-7 38-67 72-146 72-78 0-137-31-145-74z"
          fill="none" stroke="url(#blueGrad)" stroke-width="14" stroke-linecap="round"/>
    <path d="M32 80c18 24 66 40 128 40 60 0 109-15 130-38"
          fill="none" stroke="#010F28" stroke-width="12" stroke-linecap="round"/>

    <!-- Stylized B -->
    <path d="M88 40h55c35 0 57 18 57 46 0 17-8 30-24 39 22 8 35 24 35 46 0 35-26 55-70 55H88z
             M124 72v38h18c16 0 26-7 26-19 0-13-10-19-26-19zm0 69v43h22c19 0 30-8 30-22 0-14-11-21-30-21z"
          fill="#010F28" fill-rule="evenodd"/>

    <!-- Right blue accent of B -->
    <path d="M194 48c24 10 40 30 40 56 0 19-8 35-23 47 20 11 31 28 31 49 0 9-2 18-6 26 18-13 29-31 29-53 0-23-10-42-29-55 16-13 24-30 24-50 0-34-22-61-66-70z"
          fill="url(#blueGrad)"/>

    <!-- Cube -->
    <g transform="translate(114,10)">
      <polygon points="0,18 22,6 44,18 22,30" fill="#1AA7FF"/>
      <polygon points="0,18 22,30 22,55 0,43" fill="#3356F0"/>
      <polygon points="22,30 44,18 44,43 22,55" fill="#0E6BEA"/>
    </g>

    <!-- Digital pixels -->
    <rect x="174" y="16" width="13" height="13" rx="2" fill="#149BFF"/>
    <rect x="194" y="1" width="10" height="10" rx="2" fill="#3356F0"/>
    <rect x="201" y="25" width="16" height="16" rx="2" fill="#149BFF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(325,64)">
    <text x="0" y="82"
          font-family="Inter, Arial, Helvetica, sans-serif"
          font-size="82"
          font-weight="700"
          letter-spacing="-4">
      <tspan fill="#010F28">Bid</tspan><tspan fill="url(#blueGrad)">Nest</tspan>
    </text>
  </g>
</svg>
